<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Personal Productivity Tracker - Track habits, study hours, and daily productivity with analytics and insights." />
    <title>ProductivityOS</title>
    <style>
      .loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #0d0d14;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #2a2a38;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"><div class="loading-screen"><div class="spinner"></div></div></div>
  </body>
</html>
